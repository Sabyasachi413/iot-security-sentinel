<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel SOC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta http-equiv="refresh" content="5"> </head>
<body class="bg-slate-900 text-slate-100 font-sans p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-cyan-400">🛡️ Sentinel <span class="text-white">SOC</span></h1>
            <div class="text-right">
                <p class="text-sm text-slate-400">System Status: <span class="text-green-400 font-mono">ACTIVE</span></p>
                <p class="text-xs text-slate-500">Auto-refreshing every 5s</p>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-6">
            <h2 class="text-xl font-semibold text-slate-300">Live Security Audit Log</h2>
            <div class="bg-slate-800 rounded-lg overflow-hidden border border-slate-700 shadow-xl">
                <table class="w-full text-left">
                    <thead class="bg-slate-700 text-slate-300 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-3">Timestamp</th>
                            <th class="px-6 py-3">Device ID</th>
                            <th class="px-6 py-3">Threat Type</th>
                            <th class="px-6 py-3 text-center">Severity</th>
                            <th class="px-6 py-3">Description</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-700">
                        {% for alert in alerts %}
                        <tr class="hover:bg-slate-700/50 transition-colors">
                            <td class="px-6 py-4 text-xs font-mono text-slate-400">{{ alert[5] }}</td>
                            <td class="px-6 py-4 font-semibold">{{ alert[1] }}</td>
                            <td class="px-6 py-4 text-cyan-300">{{ alert[2] }}</td>
                            <td class="px-6 py-4 text-center">
                                <span class="px-2 py-1 rounded text-xs font-bold 
                                    {% if alert[3] == 'CRITICAL' %} bg-red-900 text-red-200 
                                    {% elif alert[3] == 'HIGH' %} bg-orange-900 text-orange-200
                                    {% else %} bg-yellow-900 text-yellow-200 {% endif %}">
                                    {{ alert[3] }}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-300">{{ alert[4] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
